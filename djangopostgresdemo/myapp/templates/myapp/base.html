<!doctype html>
<html>
    <head>
        <style type="text/css">
            .sidenav {
                height: 100%;
                width:160px;
                position: fixed;
                z-index:1;
                top:0;
                left:0;
                background-color: #111;
                overflow-x: hidden;
                padding-top:20px;
            }
            .sidenav a {
                padding:6px 8px 6px 16px;
                text-decoration: none;
                color: #818181;
                font-size:25px;
                display:block;
            }
            .sidenav a:hover {
                color:#f1f1f1;
            }
            .main{
                margin-left:160px;
                padding:0px 10px;
            }
        </style>

        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css">
        <title>{%block title%}Jumani's site{% endblock %}</title>
    </head>
    <body>
        <div class="sidenav">
            <a href="/home">Home</a>
            <a href="/create">Create</a>
            <a href="/view">View</a>
            <a href="/display_table">Student submissions</a>
            <a href="/mark_workbooks">Manual Marking</a>
        </div>
        <div id = "content" name="content", class="main">
            <div class="row justify-content-center">
                <div class="col-8">
                    <h1 class="mt-2">My Site</h1>
                    <hr class="mt-0 mb-4">
                    {% block content%}
                    {% endblock%}

                </div>
            </div>
        </div>
    
    </body>
</html>
